name: OpenG2P Registry Staff UI Dockers

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source repository branch/tag to build"
        required: true
        default: "develop"
        type: string
      service_file:
        description: "Service definition file"
        required: true
        default: "openg2p-registry-staff-ui/registry-staff-ui-develop.txt"
        type: choice
        options:
          - openg2p-registry-staff-ui/registry-staff-ui-develop.txt

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Docker - registry-staff-ui

    steps:

      - name: Checkout infra repo
        uses: actions/checkout@v4

   
      - name: Checkout core-ui source
        uses: actions/checkout@v4
        with:
          repository: Q-Niranjan/openg2p-registry-gen2-staff-portal-ui
          ref: ${{ inputs.source_branch }}
          path: app


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_actor }}
          password: ${{ secrets.docker_hub_token }}

    
      - name: Read service file
        id: read
        shell: bash
        run: |
          set -euo pipefail
          file="${{ inputs.service_file }}"
          [ -f "$file" ] || { echo "Service file not found: $file" >&2; exit 1; }

          mapfile -t LINES < <(awk '
            {
              s=$0
              sub(/^[[:space:]]*#!/,"",s)
              if (s ~ /^[[:space:]]*#/) next
              if (s ~ /^[[:space:]]*$/) next
              print s
            }' "$file")

          IMAGE_ID="${LINES[0]}"
          DOCKERFILE="${LINES[1]}"
          CONTEXT="${LINES[2]:-app}"

          COMMIT_HASH=$(git --no-pager log -1 --pretty=format:%H)
          CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "image=$IMAGE_ID" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT_HASH" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"

 
      - name: Build and push - registry-staff-ui
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.read.outputs.context }}
          file: ${{ steps.read.outputs.dockerfile }}
          push: true

          platforms: linux/amd64

          tags: ${{ steps.read.outputs.image }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          labels: |
            org.opencontainers.image.created=${{ steps.read.outputs.created }}
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.repository }}@${{ steps.read.outputs.commit }}
            org.opencontainers.image.revision=${{ steps.read.outputs.commit }}
            org.opencontainers.image.description=OpenG2P Registry Gen2 service image
            org.openg2p.service.name=registry-staff-ui

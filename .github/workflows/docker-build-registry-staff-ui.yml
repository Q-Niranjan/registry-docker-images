name: OpenG2P Registry Staff UI Dockers

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source repo and branch/tag (owner/repo@ref)"
        required: true
        default: "Q-Niranjan/openg2p-registry-gen2-staff-portal-ui@develop"
        type: string
      image:
        description: "Docker image tag to push (e.g. user/repo:tag)"
        required: true
        default: "qniranjan01/openg2p-registry-gen2-staff-portal-ui:develop"
        type: string
      dockerfile:
        description: "Path to Dockerfile (relative to infra repo root)"
        required: true
        default: "openg2p-registry-staff-ui/Dockerfile.ui"
        type: string
      context:
        description: "Docker build context directory"
        required: true
        default: "app"
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Docker - registry-staff-ui

    steps:

      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Parse source repository
        id: source
        shell: bash
        run: |
          set -euo pipefail
          input="${{ inputs.source_branch }}"

          if [[ "$input" =~ ^([^@#]+)[@#](.+)$ ]]; then
            repo="${BASH_REMATCH[1]}"
            ref="${BASH_REMATCH[2]}"
          elif [[ "$input" =~ ^([^/]+/[^/]+):(.+)$ ]]; then
            repo="${BASH_REMATCH[1]}"
            ref="${BASH_REMATCH[2]}"
          elif [[ "$input" =~ ^[^/]+/[^/]+$ ]]; then
            repo="$input"
            ref="develop"
          else
            echo "Invalid source_branch. Use owner/repo@ref (e.g. Q-Niranjan/openg2p-registry-gen2-staff-portal-ui@develop)" >&2
            exit 1
          fi

          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout core-ui source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          path: app


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_actor }}
          password: ${{ secrets.docker_hub_token }}

    
      - name: Set build parameters
        id: read
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_HASH=$(git --no-pager log -1 --pretty=format:%H)
          CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "image=${{ inputs.image }}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${{ inputs.dockerfile }}" >> "$GITHUB_OUTPUT"
          echo "context=${{ inputs.context }}" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT_HASH" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"

 
      - name: Build and push - registry-staff-ui
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.read.outputs.context }}
          file: ${{ steps.read.outputs.dockerfile }}
          push: true

          platforms: linux/amd64

          tags: ${{ steps.read.outputs.image }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          labels: |
            org.opencontainers.image.created=${{ steps.read.outputs.created }}
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.repository }}@${{ steps.read.outputs.commit }}
            org.opencontainers.image.revision=${{ steps.read.outputs.commit }}
            org.opencontainers.image.description=OpenG2P Registry Gen2 service image
            org.openg2p.service.name=registry-staff-ui

name: OpenG2P Registry Staff API Dockers

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image tag to push (e.g. user/repo:tag)"
        required: true
        default: "openg2p/openg2p-farmer-registry-staff-portal-api:develop"
        type: string
      dockerfile:
        description: "Path to Dockerfile (relative to infra repo root)"
        required: true
        default: "openg2p-registry-staff-api/Dockerfile.api"
        type: string
      context:
        description: "Docker build context directory"
        required: true
        default: "."
        type: string
      git_dep_1:
        description: "Git dependency 1 — farmer extension"
        required: true
        type: string
        default: "git://develop//https://github.com/Q-Niranjan/openg2p-registry-gen2-extensions#subdirectory=openg2p-registry-farmer-extension"
      git_dep_2:
        description: "Git dependency 2 — fastapi-common"
        required: true
        type: string
        default: "git://v1.1.6//https://github.com/openg2p/openg2p-fastapi-common#subdirectory=openg2p-fastapi-common"
      git_dep_3:
        description: "Git dependency 3 — fastapi-auth"
        required: true
        type: string
        default: "git://v1.1.6//https://github.com/openg2p/openg2p-fastapi-common#subdirectory=openg2p-fastapi-auth"
      git_dep_4:
        description: "Git dependency 4 — iam-core"
        required: true
        type: string
        default: "git://develop//https://github.com/openg2p/openg2p-iam-service#subdirectory=iam-core"
      git_dep_5:
        description: "Git dependency 5 — registry-core"
        required: true
        type: string
        default: "git://develop//https://github.com/Q-Niranjan/openg2p-registry-gen2-core#subdirectory=openg2p-registry-core"
      git_dep_6:
        description: "Git dependency 6 — staff-portal-api"
        required: true
        type: string
        default: "git://develop//https://github.com/Q-Niranjan/openg2p-registry-gen2-apis#subdirectory=openg2p-registry-staff-portal-api"
      git_dep_extra:
        description: "Extra git deps (optional; separate multiple with semicolons)"
        required: false
        type: string
        default: ""

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Docker - registry-staff-api
    env:
      OPENG2P_BOT_GITHUB_PAT: ${{ secrets.OPENG2P_BOT_GITHUB_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_actor }}
          password: ${{ secrets.docker_hub_token }}

      - name: Prepare build parameters
        id: read
        shell: python
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_CONTEXT: ${{ inputs.context }}
          GIT_DEP_1: ${{ inputs.git_dep_1 }}
          GIT_DEP_2: ${{ inputs.git_dep_2 }}
          GIT_DEP_3: ${{ inputs.git_dep_3 }}
          GIT_DEP_4: ${{ inputs.git_dep_4 }}
          GIT_DEP_5: ${{ inputs.git_dep_5 }}
          GIT_DEP_6: ${{ inputs.git_dep_6 }}
          GIT_DEP_EXTRA: ${{ inputs.git_dep_extra }}
        run: |
          import os
          import re
          import subprocess
          from datetime import datetime

          image_id = os.environ["INPUT_IMAGE"].strip()
          dockerfile = os.environ["INPUT_DOCKERFILE"].strip()
          context = os.environ.get("INPUT_CONTEXT", ".").strip() or "."

          if not image_id:
              raise SystemExit("image input is required")
          if not dockerfile:
              raise SystemExit("dockerfile input is required")
          if not os.path.exists(dockerfile):
              raise SystemExit(f"Dockerfile not found: {dockerfile}")

          raw_lines = []
          for key in ("GIT_DEP_1", "GIT_DEP_2", "GIT_DEP_3", "GIT_DEP_4", "GIT_DEP_5", "GIT_DEP_6"):
              line = os.environ.get(key, "").strip()
              if line:
                  raw_lines.append(line)

          extra = os.environ.get("GIT_DEP_EXTRA", "").strip()
          if extra:
              raw_lines.extend(part.strip() for part in extra.split(";") if part.strip())

          deps = []
          repo_url = ""
          git_branch = ""

          for line in raw_lines:
              if line.startswith("#"):
                  continue

              m = re.match(r"git://([^/]+)//(.+)", line)
              if m:
                  tag = m.group(1)
                  url_full = m.group(2)
                  if not repo_url:
                      repo_url = url_full
                      git_branch = tag

                  if "#" in url_full:
                      base, frag = url_full.split("#", 1)
                      req = f"git+{base}@{tag}#{frag}"
                  else:
                      req = f"git+{url_full}@{tag}"
                  deps.append(req)
              else:
                  deps.append(line)

          if not deps:
              raise SystemExit("At least one git dependency is required")

          with open("adapters.requirements.txt", "w") as f:
              f.write("\n".join(deps))

          print("---- adapters.requirements.txt ----")
          print("\n".join(deps))
          print("----------------------------------")

          try:
              commit_hash = subprocess.check_output(
                  ["git", "--no-pager", "log", "-1", "--pretty=format:%H"]
              ).decode().strip()
          except Exception:
              commit_hash = "unknown"

          created = datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          vendor = image_id.split("/")[0] if "/" in image_id else "unknown"
          try:
              title = image_id.split("/")[1].split(":")[0]
          except Exception:
              title = image_id
          version = image_id.split(":")[-1] if ":" in image_id else "latest"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a") as f:
              f.write(f"image={image_id}\n")
              f.write(f"dockerfile={dockerfile}\n")
              f.write(f"context={context}\n")
              f.write(f"created={created}\n")
              f.write(f"commit={commit_hash}\n")
              f.write(f"vendor={vendor}\n")
              f.write(f"title={title}\n")
              f.write(f"version={version}\n")
              f.write(f"repo_url={repo_url}\n")
              f.write(f"git_branch={git_branch}\n")

      - name: Build and push - registry-staff-api
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.read.outputs.context }}
          file: ${{ steps.read.outputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.read.outputs.image }}
          build-args: |
            OPENG2P_BOT_GITHUB_PAT=${{ secrets.OPENG2P_BOT_GITHUB_PAT }}
            REPO_URL=${{ steps.read.outputs.repo_url }}
            GIT_BRANCH=${{ steps.read.outputs.git_branch }}
          labels: |
            org.opencontainers.image.created=${{ steps.read.outputs.created }}
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.repository }}@${{ steps.read.outputs.commit }}
            org.opencontainers.image.version=${{ steps.read.outputs.version }}
            org.opencontainers.image.revision=${{ steps.read.outputs.commit }}
            org.opencontainers.image.vendor=${{ steps.read.outputs.vendor }}
            org.opencontainers.image.title=${{ steps.read.outputs.title }}
            org.opencontainers.image.description=OpenG2P Registry Gen2 service image
            org.openg2p.service.name=registry-staff-api
